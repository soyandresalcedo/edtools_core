{% extends "templates/web.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block page_content %}
<div class="container" style="max-width: 640px; margin: 3rem auto; text-align: center;">
	<h1 style="margin-bottom: 1rem;">{{ heading }}</h1>
	<p style="font-size: 1.05rem; line-height: 1.6;">{{ message }}</p>
	{% if fee_name %}
	<p style="margin-top: 1.5rem; color: var(--text-muted);">
		{{ _("Referencia:") }} <strong>{{ fee_name }}</strong>
	</p>
	{% endif %}
</div>
{% endblock %}
